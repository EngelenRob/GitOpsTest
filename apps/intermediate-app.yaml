apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: intermediate-nginx
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/EngelenRob/GitOpsTest.git
    targetRevision: HEAD
    path: intermediate/my-app
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
