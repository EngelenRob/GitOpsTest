apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: expert-nginx-prd
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/EngelenRob/GitOpsTest.git
    targetRevision: HEAD
    path: expert/kustomize/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: prd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
